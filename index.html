  <body style="background-color: #0a0a0a; color: #fafafa; margin: 0;">
    <nav style="padding:16px; background:#060606; display:flex; justify-content:flex-end;">
    </nav>
    <div id="root"></div>
    <footer style="padding:24px; text-align:center; color:#888;">
        &copy; <span id="year">2026</span> Alott
    </footer>
    <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
    <script>
    (function(){
      var tiles = [
        {
          href: '/tsm.html',
          title: 'Topological Semantic Mechanics',
          desc: 'Runtime Riemannian manifold evolution — breaking classical AI scaling barriers.',
          badge: 'NEW'
        },
        {
          href: '/blackpaper.html',
          title: 'TSM Whitepaper',
          desc: 'How a self-reshaping mathematical space could make AI smarter without making it bigger.'
        },
        {
          href: '/semantic-curve.html',
          title: 'Semantic Curve Theory',
          desc: 'Conceptual model linking semantic density to utility over abstraction layers.'
        }
      ];

      function makeTile(t){
        var tile = document.createElement('a');
        tile.href = t.href;
        tile.className = 'card';
        tile.style.cssText = 'display:block;text-decoration:none;margin:12px;';
        var badge = t.badge ? '<span style="display:inline-block;background:linear-gradient(135deg,#06b6d4,#10b981);color:#0a0a0a;font-size:0.6rem;font-weight:700;padding:2px 8px;border-radius:99px;margin-left:8px;vertical-align:middle;">' + t.badge + '</span>' : '';
        tile.innerHTML = '<div style="padding:20px;min-width:220px;">'
          + '<h3 class="section-title" style="font-size:1.125rem;margin:0 0 8px;color:#fff;">' + t.title + badge + '</h3>'
          + '<p class="section-subtitle" style="margin:0;color:#a1a1a1;">' + t.desc + '</p>'
          + '</div>';
        return tile;
      }

      function insertTiles(){
        var selectors = ['.projects','.projects-grid','.grid','.cards','.cards-grid','.work-grid','.portfolio','.projects-list'];
        var container = null;
        for(var i=0;i<selectors.length;i++){
          container = document.querySelector(selectors[i]);
          if(container) break;
        }
        if(!container){
          var root = document.getElementById('root');
          if(root){
            var sec = document.createElement('section');
            sec.className='container';
            sec.style.padding='40px 20px';
            sec.innerHTML='<h2 class="section-title">Research & Projects</h2>';
            container = sec;
            root.parentNode.insertBefore(sec, root.nextSibling);
          }
        }
        if(container){
          for(var j=0;j<tiles.length;j++){
            container.appendChild(makeTile(tiles[j]));
          }
        }
      }

      if(document.readyState==='loading'){
        document.addEventListener('DOMContentLoaded',function(){setTimeout(insertTiles,500)});
      } else {
        setTimeout(insertTiles,500);
      }
    })();
    </script>
  </body>
